{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Seating - {{ exam_name }}</title>
  <link rel="stylesheet" href="{% static 'core/css/dash_board.css' %}">
  <style>
    #back-link { color:#1976d2; text-decoration:none; font-weight:500; transition:0.2s; }
    #back-link:hover { color:#1565c0; border-bottom:2px solid #1976d2; }
    .room-card { margin-bottom: 25px; background:#f9f9f9; border:1px solid #e0e0e0; border-radius:6px; padding:18px; width:100%; }
    .room-header { display:flex; justify-content:space-between; align-items:center; gap:15px; margin-bottom:12px; padding-bottom:12px; border-bottom:1px solid #ddd; }
    .dept-info { margin-bottom:12px; padding:10px; background:#fff; border-left:3px solid #1976d2; border-radius:3px; }
    .dept-info strong { color:#1976d2; }
    .seating-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap:6px; margin-top:12px; }
    .seat-cell { border:1px solid #e0e0e0; border-radius:4px; padding:8px; min-height:48px; background:#fafafa; font-size:0.85rem; }
    .seat-cell.empty { background:#fff; opacity:0.98; }
    .seat-cell .empty-seat { color:#666; font-weight:600; font-style:normal; text-align:center; margin-top:6px; }
    .room-meta { color:#666; font-size:0.9rem; }
    .room-actions { display:flex; gap:8px; }
    .room-actions .delete-btn { background:#e53935; color:#fff; border:none; padding:6px 8px; border-radius:4px; cursor:pointer; font-size:0.85rem; }
    .room-actions .delete-btn:hover { background:#d32f2f; }
    .room-actions .delete-btn:disabled { opacity:0.6; cursor:not-allowed; }
    /* Step 5 style */
    .seat-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .seat-row { display: grid; grid-template-columns: repeat(5, minmax(70px, 1fr)); gap: 8px; }
    .seat { border: 1px solid #aaa; background: #ffffff; transition: all 0.2s ease; font-size: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; width: 72px; height: 72px; min-width: 72px; min-height: 72px; box-sizing: border-box; padding: 4px; border-radius: 10px; overflow: hidden; }
    .seat.eligible { background: #28a745; color: white; border-color: #228b22; }
    .seat.blocked { background: #ffffff; color: #000; border-color: #ccc; }
    .seat.empty { background: #f1f1f1; color: #666; font-style: italic; border-color: #ccc; }
    .seat-num { font-weight: 700; font-size: 10px; margin-bottom: 4px; }
    .seat-info { font-size: 9px; line-height: 1.1; max-height: 42px; overflow: hidden; width:100%; }
    .seat-row { display: grid; grid-template-columns: repeat(5, minmax(72px, 1fr)); gap: 8px; }
    .seat-grid { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
    .room-card { margin-bottom: 25px; background:#f9f9f9; border:1px solid #d0d0d0; border-radius:8px; padding:18px; }
    .room-meta { color:#666; font-size:0.9rem; }
    .dept-info { margin-bottom:12px; padding:12px; background:#fff; border-left:3px solid #1976d2; border-radius:6px; }
  </style>
</head>
<body>
  <div style="max-width:1400px;margin:30px auto;padding:0 16px;">
    <a id="back-link" href="/dashboard/">← Back to Dashboard</a>
    <h1 style="margin-top:12px; margin-bottom:8px;">Exam Seating — {{ exam_name }}</h1>
    <div style="margin-bottom:18px; color:#444; font-size:0.95rem;">
      <strong>Start Date:</strong> {{ start_date|default:"N/A" }} &nbsp; | &nbsp; <strong>End Date:</strong> {{ end_date|default:"N/A" }}
    </div>
    <div id="roomsContainer">
      <p style="color:#666;">Loading seating data...</p>
    </div>
  </div>

  {% now "U" as now_ts %}

  <script>
    // CSRF helper for fetch calls
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith(name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }
    const csrftoken = getCookie('csrftoken') || '';
    window.EXAM_ID = "{{ exam_id }}";
    window.CSRF_TOKEN = csrftoken;
  </script>
  <script src="{% static 'core/js/view_exam.js' %}?v={{ now_ts }}"></script>
</body>
</html>
