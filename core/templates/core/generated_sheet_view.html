{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generated Attendance Sheets - {{ exam_name }}</title>
  <link rel="stylesheet" href="{% static 'core/css/attendance_sheet_print.css' %}?v=20260401">
  <style>body{margin:0;}.action-btn{padding:8px 12px;margin:10px;display:inline-block;text-decoration:none;color:#000;background:#f3f3f3;border:1px solid #999;border-radius:2px;}</style>
</head>
<body>
  <p style="margin:10px 0;"><a href="{% url 'dashboard' %}?tab=generate-sheet" class="no-print" style="color:#1976d2;text-decoration:none;">&larr; Back to Dashboard</a></p>
  <a class="action-btn no-print" href="{% url 'download_attendance_sheet_pdf' %}?id={{ request.GET.id }}">Download PDF</a>
  <div id="sheetsPreview"></div>
  {{ sheets|json_script:"initialSheets" }}
  {{ exam_name|json_script:"initialExamName" }}
  <script src="{% static 'core/js/attendance_wizard.js' %}?v=20260401"></script>
  <script>
    const initialSheets = JSON.parse(document.getElementById('initialSheets').textContent);
    const initialExamName = JSON.parse(document.getElementById('initialExamName').textContent);

    document.addEventListener('DOMContentLoaded', () => {
      showStep3(initialSheets, initialExamName);
    });
  </script>
</body>
</html>
